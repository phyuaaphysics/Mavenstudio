<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Maven - English Learning</title>

    <!-- iOS PWA Status Bar Fix -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital@1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital@1&family=Cinzel:wght@400;500&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,600&display=swap');

        :root {
            --mint-deep: #0c4a6e;
            --mint-primary: #0ea5e9;
            --mint-accent: #38bdf8;
            --mint-bg: #f0f9ff;
            --mint-glass: rgba(240, 249, 255, 0.85);
            --mint-nav-glass: rgba(255, 255, 255, 0.75);
            --sage-deep: #1e3a5f;
            --sage-muted: #64748b;
            --sage-active: #0284c7;
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--mint-bg);
            color: var(--mint-deep);
            -webkit-tap-highlight-color: transparent;
            height: 100%;
            overflow-y: auto;
            padding-top: 0;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ===== 顶部栏 Logo Bar ===== */
        .logo-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 120;
            background-color: rgba(66, 146, 198, 0.85) !important;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.25) !important;
            padding-top: calc(env(safe-area-inset-top, 0px) + 8px);
            padding-bottom: 12px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.dark-mode .logo-bar {
            background-color: rgba(66, 146, 198, 0.85) !important;
            border-bottom-color: rgba(255, 255, 255, 0.25) !important;
        }

        #main-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: left center;
            will-change: transform;
        }

        .scrolled #main-logo {
            transform: scale(0.75);
        }

        .brand-icon {
            flex-shrink: 0;
            width: 2rem;
            height: 2rem;
            display: block;
        }

        .maven-brand {
            font-family: 'Averia Serif Libre', serif;
            font-style: italic;
            font-weight: 400;
            color: white;
            font-size: 2.25rem;
            letter-spacing: -0.025em;
            display: inline-block;
            line-height: 1.2;
        }

        .logo-bar .search-icon {
            color: white;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .logo-bar .search-icon:hover {
            opacity: 1;
        }

        body.dark-mode .logo-bar .search-icon {
            color: white;
            opacity: 0.8;
        }
        body.dark-mode .logo-bar .search-icon:hover {
            opacity: 1;
        }

        /* ===== 页面加载 ===== */
        #page-loader {
            position: fixed;
            inset: 0;
            background-color: var(--mint-bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
        #page-loader.active {
            opacity: 1;
            visibility: visible;
        }

        #page-content {
            padding-top: calc(env(safe-area-inset-top, 0px) + 95px);
        }

        /* ===== STREAMING_CHUNK: Styling the Canva-style name card session ===== */
        /* ===== Canva-style Name Card Art ===== */
        .welcome-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(240, 249, 255, 0.45) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 
                0 20px 40px -15px rgba(12, 74, 110, 0.12),
                0 1px 3px rgba(255, 255, 255, 0.4) inset,
                0 0 0 1px rgba(14, 165, 233, 0.05);
            padding: 1.5rem;
            width: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.dark-mode .welcome-card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(12, 18, 34, 0.5) 100%);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 20px 40px -15px rgba(0, 0, 0, 0.4),
                0 1px 1px rgba(255, 255, 255, 0.05) inset;
        }

        /* Canva background vector accents */
        .welcome-card::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            border-radius: 50%;
            transition: transform 0.5s ease;
        }

        .welcome-card:hover::before {
            transform: scale(1.15) translate(-10px, 10px);
        }

        .welcome-card::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            border-radius: 50%;
        }

        .card-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 1rem;
        }

        /* Dynamic avatar badge styling */
        .avatar-wrapper {
            display: none;
        }

        .info-pane {
            flex-grow: 1;
            text-align: left;
        }

        .welcome-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(14, 165, 233, 0.1);
            color: #0284c7;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 100px;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(14, 165, 233, 0.15);
        }

        body.dark-mode .welcome-tag {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.2);
        }

        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--mint-deep);
            line-height: 1.2;
            margin-bottom: 0.75rem;
        }

        .canva-meta-grid {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .meta-chip {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(14, 165, 233, 0.1);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        body.dark-mode .meta-chip {
            background: rgba(15, 23, 42, 0.4);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .meta-chip:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(14, 165, 233, 0.25);
            transform: translateY(-1px);
        }

        body.dark-mode .meta-chip:hover {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(56, 189, 248, 0.2);
        }

        .meta-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--sage-muted);
            margin-bottom: 2px;
        }

        .meta-val {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--mint-deep);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .meta-val-highlight {
            color: #0284c7;
        }

        body.dark-mode .meta-val-highlight {
            color: #38bdf8;
        }

        @media (max-width: 1024px) {
            .card-inner {
                flex-direction: column;
                gap: 1.25rem;
                text-align: center;
            }
            .info-pane {
                text-align: center;
                width: 100%;
            }
            .canva-meta-grid {
                grid-template-cols: repeat(2, 1fr);
                gap: 0.5rem;
            }
            .welcome-title {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 768px) {
            .canva-meta-grid {
                grid-template-cols: 1fr;
            }
        }

        /* ===== 卡片网格 ===== */
        .grid-container {
            display: grid;
            gap: 16px;
            padding: 0 0 40px 0;
            width: 100%;
        }

        /* ===== 卡片 ===== */
        .poster-card {
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            background: #bae6fd;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 12px -4px rgba(12, 74, 110, 0.1);
        }

        .poster-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(12, 74, 110, 0.2);
        }

        .poster-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== 磨砂玻璃标题条 ===== */
        .glass-title-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 90%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.40);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: background 0.3s ease, transform 0.3s ease;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .poster-card:hover .glass-title-bar {
            background: rgba(0, 0, 0, 0.55);
            transform: translateX(-50%) scale(1.02);
        }

        .card-title-text {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 1.4rem;
            color: #ffffff;
            line-height: 1.3;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }

        /* ===== 其他原有样式 ===== */
        #iframe-container {
            position: fixed;
            inset: 0;
            z-index: 400;
            background: black;
            display: none;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #iframe-container.active {
            display: block;
            opacity: 1;
        }

        .iframe-close-btn {
            position: absolute;
            top: calc(env(safe-area-inset-top, 0px) + 15px);
            right: 20px;
            z-index: 410;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .iframe-close-btn:hover {
            background: rgba(0, 0, 0, 0.6);
            transform: scale(1.1);
        }

        .dock-wrapper {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s;
            width: auto;
            min-width: 280px;
        }

        .dock-wrapper.collapsed {
            transform: translateX(-50%) translateY(200px);
            opacity: 0;
        }

        .dock-nav {
            background-color: rgba(30, 58, 95, 0.85);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1.5px solid rgba(14, 165, 233, 0.3);
            padding: 12px 14px;
            border-radius: 42px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .dock-toggle-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 14px;
        }

        .dock-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--sage-muted);
            transition: all 0.3s;
            min-width: 58px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .dock-item i {
            font-size: 1.6rem;
        }
        .dock-item span {
            font-size: 9px;
            font-weight: 500;
            opacity: 0.7;
        }
        .dock-item.active {
            color: white;
        }

        .dock-trigger-bar {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 5px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            z-index: 199;
            cursor: pointer;
            display: none;
        }
        .dock-wrapper.collapsed+.dock-trigger-bar {
            display: block;
        }

        @media (max-width: 1024px) {
            #page-content {
                padding-top: calc(env(safe-area-inset-top, 0px) + 105px);
            }
        }

        @media (max-width: 768px) {
            .maven-brand {
                font-size: 1.75rem;
            }
            .brand-icon {
                width: 1.6rem;
                height: 1.6rem;
            }
            .welcome-card {
                padding: 0.875rem;
                border-radius: 20px;
            }
            .welcome-tag {
                font-size: 0.65rem;
                padding: 3px 10px;
                margin-bottom: 0.5rem;
            }
            .welcome-title {
                font-size: 1.3rem;
                margin-bottom: 0.5rem;
            }
            .meta-label {
                font-size: 0.6rem;
            }
            .meta-val {
                font-size: 0.875rem;
            }
            .grid-container {
                gap: 10px;
            }
            .glass-title-bar {
                bottom: 12px;
                padding: 8px 12px;
                width: 90%;
                border-radius: 12px;
            }
            .card-title-text {
                font-size: 1.1rem;
                white-space: normal;
                overflow: hidden;
                text-overflow: ellipsis;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
            }
        }

        /* ===== 暗色模式 ===== */
        body.dark-mode {
            --mint-deep: #f0f9ff;
            --mint-primary: #38bdf8;
            --mint-accent: #0ea5e9;
            --mint-bg: #0c1222;
            --mint-glass: rgba(12, 18, 34, 0.85);
            --mint-nav-glass: rgba(12, 18, 34, 0.75);
            --sage-deep: #e2e8f0;
            --sage-muted: #94a3b8;
            --sage-active: #38bdf8;

            background-color: var(--mint-bg);
            color: var(--mint-deep);
        }

        body.dark-mode .poster-card {
            background: #112233;
            border-color: rgba(255, 255, 255, 0.05);
        }
        body.dark-mode .glass-title-bar {
            background: rgba(0, 0, 0, 0.55);
            border-color: rgba(255, 255, 255, 0.08);
        }
        body.dark-mode .poster-card:hover .glass-title-bar {
            background: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body class="pb-40 hide-scrollbar">

    <div id="page-loader" class="active">
        <div class="flex flex-col items-center">
            <p class="text-[10px] font-black tracking-[0.3em] text-sky-400 uppercase">Maven</p>
            <p id="loader-status" class="text-[10px] text-sky-800 mt-2 opacity-50">Loading cloud data...</p>
        </div>
    </div>

    <!-- ===== 顶部栏 ===== -->
    <header id="header-root">
        <div class="logo-bar px-6" id="logo-nav-bar">
            <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
                <div id="main-logo">
                    <svg class="brand-icon" viewBox="0 0 63.29747 49.991211" fill="none" xmlns="http://www.w3.org/2000/svg">

                    </svg>
                    <span class="maven-brand">Maven</span>
                </div>
                <div class="flex items-center gap-6">
                    <i class="fas fa-search text-xl search-icon cursor-pointer"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== STREAMING_CHUNK: Rearranging structural layout container grid ===== -->
    <div id="page-content" class="max-w-screen-2xl mx-auto px-4 md:px-12">
        <!-- ===== 欢迎卡片列 (Canva-inspired Name Card Session) ===== -->
        <section id="welcome-section" class="mb-6">
            <div class="welcome-card group">
                <div class="card-inner">
                    <!-- Information Section -->
                    <div class="info-pane">
                        <div class="welcome-tag">
                            <i class="fas fa-graduation-cap text-[10px] mr-1"></i> Student Member
                        </div>
                        <h2 class="welcome-title">Welcome back, <span id="welcome-display-name">Guest</span>!</h2>
                        
                        <div class="canva-meta-grid">
                            <div class="meta-chip">
                                <span class="meta-label">Username</span>
                                <span class="meta-val meta-val-highlight" id="welcome-username">Guest</span>
                            </div>
                            <div class="meta-chip">
                                <span class="meta-label">Class</span>
                                <span class="meta-val" id="welcome-class">—</span>
                            </div>
                            <div class="meta-chip">
                                <span class="meta-label">Class No.</span>
                                <span class="meta-val" id="welcome-class-no">—</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ===== 卡片列表列 ===== -->
        <main class="space-y-6" id="main-content"></main>
    </div>

    <!-- Fullscreen Iframe Container -->
    <div id="iframe-container">
        <div class="iframe-close-btn" onclick="closeIframe()"><i class="fas fa-times"></i></div>
        <iframe id="sim-frame" src="" class="w-full h-full border-none"></iframe>
    </div>

    <!-- Dock Navigation -->
    <div id="dock-nav-wrapper" class="dock-wrapper">
        <nav class="dock-nav">
            <div class="dock-toggle-btn" onclick="toggleDock()"><i class="fas fa-chevron-down"></i></div>
            <div class="dock-content">
                <button onclick="scrollToTop()" class="dock-item active">
                    <i class="fas fa-home"></i><span class="uppercase">Home</span>
                </button>
                <button class="dock-item">
                    <i class="fas fa-book-open"></i><span class="uppercase">Library</span>
                </button>
                <button class="dock-item">
                    <i class="fas fa-podcast"></i><span class="uppercase">Podcast</span>
                </button>
            </div>
            <div class="dock-toggle-btn" onclick="toggleDock()"><i class="fas fa-chevron-down"></i></div>
        </nav>
    </div>
    <div id="dock-handle" onclick="toggleDock()" class="dock-trigger-bar"></div>

    <script>
        const SPREADSHEET_ID = '1AYA_MbZlR3zYxkog6ol_BBvUu1tBnU_BG_Tq6XJInX4';
        const FETCH_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

        let config = { heroData: null, cards: [] };
        const loader = document.getElementById('page-loader');
        let lastScrollY = window.scrollY;

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }

        async function loadSheetData() {
            const syncIcon = document.getElementById('sync-icon');
            if (syncIcon) syncIcon.classList.add('animate-spin');

            try {
                const response = await fetch(FETCH_URL);
                const data = await response.text();
                const rows = data.split('\n').map(row => {
                    const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    return matches ? matches.map(m => m.replace(/^"|"$/g, '')) : [];
                });

                let heroImage = '';
                const cards = [];

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 3) continue;

                    const [order, type, title, pic, url] = row;

                    if (type === 'HERO' && pic) {
                        heroImage = pic;
                        config.heroData = { image: pic };
                    } else if (type === 'CARD') {
                        cards.push({
                            order: parseInt(order) || i,
                            title: title,
                            image: pic,
                            url: url
                        });
                    }
                }

                cards.sort((a, b) => a.order - b.order);
                config.cards = cards;

                renderCards();

                setTimeout(() => {
                    if (syncIcon) syncIcon.classList.remove('animate-spin');
                    loader.classList.remove('active');
                }, 400);
            } catch (error) {
                console.error("Failed to load data:", error);
                if (syncIcon) syncIcon.classList.remove('animate-spin');
                document.getElementById('loader-status').innerText = "Failed to load. Please check your connection.";
            }
        }

        function toggleDock() {
            document.getElementById('dock-nav-wrapper').classList.toggle('collapsed');
        }

        function openIframe(url) {
            const container = document.getElementById('iframe-container');
            const frame = document.getElementById('sim-frame');
            frame.src = url;
            container.style.display = 'block';
            requestAnimationFrame(() => {
                container.classList.add('active');
            });
            document.body.style.overflow = 'hidden';
        }

        function closeIframe() {
            const container = document.getElementById('iframe-container');
            const frame = document.getElementById('sim-frame');
            container.classList.remove('active');
            setTimeout(() => {
                container.style.display = 'none';
                frame.src = '';
            }, 400);
            document.body.style.overflow = 'auto';
        }

        function scrollToContent() {
            const main = document.getElementById('main-content');
            if (main) main.scrollIntoView({ behavior: 'smooth' });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* ===== STREAMING_CHUNK: Dynamic creation of pathway cards ===== */
        function renderCards() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            if (config.cards.length === 0) return;

            const section = document.createElement('section');
            section.id = 'cards-section';
            section.className = 'px-0';

            // Custom styled typography referencing 'image_0cf4c3.png' layout style
            section.innerHTML = `
                <div class="mb-8 text-left max-w-2xl px-2 md:px-0">
                    <h2 class="text-4xl md:text-5xl font-extrabold tracking-tight text-[#0c4a6e] dark:text-white leading-[1.1] mb-4" style="font-family: 'Inter', sans-serif;">
                        Exercises<br>
                        based on <span class="text-[#0ea5e9] dark:text-[#38bdf8] italic font-normal" style="font-family: 'Playfair Display', Georgia, serif;">your</span><br>
                        needs
                    </h2>
                    <p class="text-sm md:text-base text-slate-500 dark:text-slate-400 font-normal leading-relaxed">
                        Personalized pathway exercises tailored dynamically to bolster pronunciation skills, active confidence, behavioral mastery, and linguistic inclusivity.
                    </p>
                </div>
                <div class="grid-container grid grid-cols-2 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3" id="cards-grid"></div>
            `;
            mainContent.appendChild(section);

            const grid = document.getElementById('cards-grid');
            config.cards.forEach(card => {
                const div = document.createElement('div');
                div.className = `grid-item-card flex flex-col group`;
                div.innerHTML = `
                        <div class="poster-card relative">
                            <img src="${card.image}" class="w-full h-full object-cover" alt="${card.title}" />
                            <div class="glass-title-bar">
                                <span class="card-title-text">${card.title}</span>
                            </div>
                        </div>
                    `;
                div.onclick = () => openIframe(card.url);
                grid.appendChild(div);
            });
        }

        // ===== STREAMING_CHUNK: Binding User Profile State variables =====
        function loadUserInfo() {
            const username = localStorage.getItem('user_username') || 'Guest';
            const userClass = localStorage.getItem('user_class') || '—';
            const userClassNo = localStorage.getItem('user_class_no') || '—';

            const usernameEl = document.getElementById('welcome-username');
            if (usernameEl) usernameEl.textContent = username;

            const classEl = document.getElementById('welcome-class');
            if (classEl) classEl.textContent = userClass;

            const classNoEl = document.getElementById('welcome-class-no');
            if (classNoEl) classNoEl.textContent = userClassNo;

            const displayNameEl = document.getElementById('welcome-display-name');
            if (displayNameEl) displayNameEl.textContent = username;

            const avatarEl = document.getElementById('welcome-avatar');
            if (avatarEl) {
                avatarEl.textContent = username.trim().charAt(0).toUpperCase();
            }
        }

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY || document.documentElement.scrollTop;
            if (currentScrollY > 30) document.body.classList.add('scrolled');
            else document.body.classList.remove('scrolled');

            lastScrollY = currentScrollY;
        }, { passive: true });

        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                applyTheme(e.newValue);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            applyTheme(savedTheme);
            loadUserInfo();
            loadSheetData();
        });
    </script>
</body>
</html>
