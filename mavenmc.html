<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PH Studio - 線上測驗系統</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://unpkg.com/lucide@latest">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&family=Shippori+Mincho:wght@700&family=Sofia+Sans:wght@700;800;900&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.05)), url('https://i.ibb.co/yn7JJ8yy/classroom.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .cinzel-title {
            font-family: 'Cinzel', serif;
        }
        .shippori-title {
            font-family: 'Shippori Mincho', serif;
            font-weight: 700;
        }
        .sofia-font {
            font-family: 'Sofia Sans', sans-serif;
        }

        /* Crystal-style light frosted panel (replaces dark glass-panel) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        /* Symmetric light pill input */
        .pill-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(15, 23, 42, 0.12);
            color: #0f172a;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pill-input:focus {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
            outline: none;
        }

        .pill-input::placeholder {
            color: rgba(15, 23, 42, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        /* Gentle progressive fade-in */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* OS-style elastic damping entrance (used for login) */
        @keyframes osDamping {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.95);
                filter: blur(8px);
            }
            55% {
                opacity: 0.9;
                transform: translateY(-6px) scale(1.01);
                filter: blur(0px);
            }
            75% {
                transform: translateY(2px) scale(0.997);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
            }
        }
        .animate-os-damping {
            animation: osDamping 1.1s cubic-bezier(0.25, 1, 0.2, 1) forwards;
        }

        /* iOS-grade damped entrance (replaces old slideUp for menu / quiz / results) */
        @keyframes iosMenuEntrance {
            0% {
                opacity: 0;
                transform: translateY(35px) scale(0.96);
                filter: blur(10px);
            }
            60% {
                transform: translateY(-3px) scale(1.006);
                filter: blur(0px);
            }
            80% {
                transform: translateY(1px) scale(0.998);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
            }
        }
        .animate-slide-up {
            animation: iosMenuEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Quiz menu card — light, emerald hover */
        .quiz-card {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(15, 23, 42, 0.08);
            transition: all 0.3s;
        }

        .quiz-card:hover {
            background: rgba(255, 255, 255, 0.88);
            border-color: rgba(16, 185, 129, 0.45);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
        }

        /* Option buttons — light theme, emerald selection */
        .option-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(15, 23, 42, 0.1);
            color: #0f172a;
            transition: all 0.3s;
        }

        .option-btn:hover {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.45);
        }

        .option-btn.selected {
            background: rgba(16, 185, 129, 0.18);
            border-color: #10b981;
        }

        .option-btn.correct {
            background: rgba(16, 185, 129, 0.22);
            border-color: #10b981;
        }

        .option-btn.wrong {
            background: rgba(244, 63, 94, 0.18);
            border-color: #f43f5e;
        }

        /* Progress bar — light track, emerald fill */
        .progress-bar {
            background: rgba(15, 23, 42, 0.08);
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #10b981, #34d399);
            height: 100%;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <!-- Header -->
    <header class="w-full p-4 z-10 relative">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/50 border border-white/60 flex items-center justify-center">
                    <i data-lucide="graduation-cap" class="w-5 h-5 text-emerald-700"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold shippori-title text-slate-900">PH Studio</h1>
                    <p class="text-[10px] text-slate-500 tracking-widest uppercase">Quiz Platform</p>
                </div>
            </div>
            <div id="user-info" class="hidden flex items-center space-x-4">
                <span id="display-name" class="text-sm text-slate-700 font-medium"></span>
                <button id="logout-btn" class="w-8 h-8 rounded-full bg-white/50 hover:bg-rose-500/20 hover:border-rose-500/30 border border-slate-900/[0.08] flex items-center justify-center text-slate-700 hover:text-rose-600 transition">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 pb-8 relative z-10">

        <!-- Login Section -->
        <div id="login-section" class="glass-panel max-w-[440px] mx-auto mt-20 p-10 md:p-12 text-center rounded-[2.5rem] animate-os-damping shadow-2xl">
            <div class="flex justify-center mb-8">
                <div class="w-14 h-14 bg-white/40 p-0.5 border border-white/50 shadow-inner flex items-center justify-center">
                    <img src="https://phyuaaphysics.github.io/phyustudio/appicon.png" alt="PH Logo" class="w-full h-full" />
                </div>
            </div>
            <h2 class="text-2xl md:text-[2rem] font-bold tracking-[0.15em] text-slate-900 shippori-title leading-tight">線上測驗系統</h2>
            <h3 class="text-xs tracking-[0.4em] text-slate-400 cinzel-title mt-3.5 uppercase">Student Portal</h3>
            <div class="w-6 h-[1px] bg-slate-300 mx-auto mt-4"></div>

            <form id="login-form" class="space-y-5 mt-10">
                <input type="text" id="username" required placeholder="Username" class="pill-input w-full px-6 py-3.5 rounded-full text-sm font-light tracking-wide" />
                <input type="password" id="password" required placeholder="Password" class="pill-input w-full px-6 py-3.5 rounded-full text-sm font-light tracking-wide" />

                <div id="error-msg" class="hidden bg-rose-50/70 border border-rose-300 text-rose-800 p-3.5 rounded-2xl text-xs text-left flex items-start space-x-2 animate-fade-in shadow-sm">
                    <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 mt-0.5 text-rose-400"></i>
                    <span id="error-text" class="leading-relaxed font-medium"></span>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs tracking-[0.25em] uppercase py-4 rounded-full shadow-md hover:shadow-lg transition duration-300 transform active:scale-98 flex items-center justify-center space-x-2">
                    <span>Login & Verify</span>
                </button>
            </form>

            <div class="flex justify-center mt-10">
                <div class="w-10 h-10 rounded-full bg-emerald-500/10 border border-emerald-400/20 flex items-center justify-center text-emerald-600 shadow-sm">
                    <i data-lucide="cloud" class="w-4 h-4"></i>
                </div>
            </div>
        </div>

        <!-- Quiz Menu Section -->
        <div id="menu-section" class="hidden space-y-6 animate-slide-up">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold shippori-title mb-2 text-slate-900">選擇測驗</h2>
                <p class="text-sm text-slate-500">Select a quiz to begin</p>
            </div>

            <div id="quiz-list" class="grid gap-4">
                <!-- Quiz cards will be loaded here -->
            </div>
        </div>

        <!-- Quiz Taking Section -->
        <div id="quiz-section" class="hidden space-y-6 animate-slide-up">
            <!-- Quiz Header -->
            <div class="glass-panel rounded-2xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="quiz-title" class="text-xl font-bold shippori-title text-slate-900">Quiz</h2>
                        <p id="quiz-progress" class="text-xs text-slate-500">Question 1 of 10</p>
                    </div>
                    <button id="back-to-menu" class="px-4 py-2 rounded-full bg-white/55 hover:bg-white/85 border border-slate-900/[0.08] text-slate-700 text-sm transition">
                        <i data-lucide="arrow-left" class="w-4 h-4 inline mr-1"></i> Back
                    </button>
                </div>
                <div class="progress-bar h-2">
                    <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Paragraph -->
            <div id="paragraph-card" class="glass-panel rounded-2xl p-6">
                <h3 class="text-sm font-bold text-emerald-700 mb-3 flex items-center">
                    <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> Reading Passage
                </h3>
                <div id="paragraph-text" class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap"></div>
            </div>

            <!-- Question Card -->
            <div id="question-card" class="glass-panel rounded-2xl p-6">
                <h3 id="question-text" class="text-lg font-medium mb-6 text-slate-900"></h3>
                <div id="options-container" class="space-y-3">
                    <!-- Options will be loaded here -->
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between items-center">
                <button id="prev-btn" class="px-6 py-3 rounded-full bg-white/55 hover:bg-white/85 border border-slate-900/[0.08] text-slate-700 transition disabled:opacity-30" disabled>
                    <i data-lucide="chevron-left" class="w-4 h-4 inline mr-1"></i> Previous
                </button>
                <button id="next-btn" class="px-6 py-3 rounded-full bg-slate-900 hover:bg-slate-800 text-white transition">
                    Next <i data-lucide="chevron-right" class="w-4 h-4 inline ml-1"></i>
                </button>
                <button id="submit-quiz-btn" class="hidden px-8 py-3 rounded-full bg-emerald-600 hover:bg-emerald-500 text-white transition font-bold">
                    <i data-lucide="check" class="w-4 h-4 inline mr-1"></i> Submit Quiz
                </button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="hidden animate-slide-up">
            <div class="glass-panel max-w-[500px] mx-auto rounded-3xl p-10 text-center">
                <div id="result-icon" class="w-24 h-24 mx-auto rounded-full bg-emerald-500/10 border border-emerald-400/20 flex items-center justify-center mb-6">
                    <i data-lucide="award" class="w-12 h-12 text-emerald-600"></i>
                </div>
                <h2 class="text-3xl font-bold shippori-title mb-2 text-slate-900">測驗完成!</h2>
                <p class="text-slate-500 mb-8">Quiz Completed</p>

                <div class="space-y-4 mb-8">
                    <div class="glass-panel rounded-xl p-4">
                        <p class="text-sm text-slate-500">Your Score</p>
                        <p id="result-score" class="text-5xl font-black sofia-font text-emerald-700">0/0</p>
                    </div>
                    <div class="glass-panel rounded-xl p-4">
                        <p class="text-sm text-slate-500">Percentage</p>
                        <p id="result-percentage" class="text-3xl font-bold text-slate-900">0%</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <button id="review-btn" class="w-full py-3 rounded-full bg-slate-900 hover:bg-slate-800 text-white transition font-bold">
                        <i data-lucide="eye" class="w-4 h-4 inline mr-2"></i> Review Answers
                    </button>
                    <button id="back-to-menu-btn" class="w-full py-3 rounded-full bg-white/55 hover:bg-white/85 border border-slate-900/[0.08] text-slate-700 transition">
                        <i data-lucide="list" class="w-4 h-4 inline mr-2"></i> Back to Menu
                    </button>
                </div>
            </div>

            <!-- Review Section -->
            <div id="review-section" class="hidden mt-6 space-y-4">
                <!-- Review cards will be loaded here -->
            </div>
        </div>

    </main>

    <script>
        // ============ CONFIG ============
        const GAS_AUTH_URL = "https://script.google.com/macros/s/AKfycbxgQQ3CvSsWofTL1UVPre7u_1RkYDsxTB5FGV_J_I--nCwsLFMPrYCflXK2kicuUurH/exec";
        const GAS_LOADER_URL = "https://script.google.com/macros/s/AKfycbyVp3CQehZT0kKc-Sn3MgQqoexsN7tZe3XlUUQtwAkn_lRfHdDPlgT5wfkvo4ypYClYkg/exec";

        // ============ STATE ============
        let currentQuiz = null;
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let correctAnswers = {};
        let quizData = null;

        // ============ DOM ELEMENTS ============
        const loginSection = document.getElementById('login-section');
        const menuSection = document.getElementById('menu-section');
        const quizSection = document.getElementById('quiz-section');
        const resultsSection = document.getElementById('results-section');
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');
        const submitBtn = document.getElementById('submit-btn');
        const userInfo = document.getElementById('user-info');
        const displayName = document.getElementById('display-name');

        // ============ INIT ============
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            checkExistingSession();
            setupEventListeners();
        });

        function setupEventListeners() {
            loginForm.addEventListener('submit', handleLogin);
            document.getElementById('logout-btn').addEventListener('click', handleLogout);
            document.getElementById('back-to-menu').addEventListener('click', showMenuSection);
            document.getElementById('prev-btn').addEventListener('click', showPreviousQuestion);
            document.getElementById('next-btn').addEventListener('click', showNextQuestion);
            document.getElementById('submit-quiz-btn').addEventListener('click', submitQuiz);
            document.getElementById('back-to-menu-btn').addEventListener('click', () => {
                resultsSection.classList.add('hidden');
                showMenuSection();
            });
            document.getElementById('review-btn').addEventListener('click', toggleReview);
        }

        // ============ SESSION CHECK ============
        async function checkExistingSession() {
            const token = localStorage.getItem('jwt_token');
            const name = localStorage.getItem('user_real_name');

            if (token && name) {
                userInfo.classList.remove('hidden');
                displayName.textContent = name;
                loginSection.classList.add('hidden');
                await loadQuizMenu();
            }
        }

        // ============ LOGIN ============
        async function handleLogin(e) {
            e.preventDefault();
            errorMsg.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="animate-spin inline-block">⟳</span> Checking...';

            try {
                const response = await fetch(GAS_AUTH_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('jwt_token', data.token || "");
                    localStorage.setItem('user_role', data.role || "student");
                    localStorage.setItem('user_username', username);

                    if (data.identity_tag) {
                        localStorage.setItem('user_real_name', data.identity_tag.real_name || "");
                        localStorage.setItem('user_class', data.identity_tag.class || "");
                        localStorage.setItem('user_class_no', data.identity_tag.class_no || "");
                    }

                    userInfo.classList.remove('hidden');
                    displayName.textContent = localStorage.getItem('user_real_name');
                    loginSection.classList.add('hidden');
                    await loadQuizMenu();
                } else {
                    showError(data.message || "Login failed");
                }
            } catch (err) {
                showError("Connection error. Please try again.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Login & Verify</span>';
            }
        }

        function handleLogout() {
            localStorage.clear();
            userInfo.classList.add('hidden');
            loginSection.classList.remove('hidden');
            menuSection.classList.add('hidden');
            quizSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            loginForm.reset();
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        // ============ QUIZ MENU ============
        async function loadQuizMenu() {
            const token = localStorage.getItem('jwt_token');
            const quizList = document.getElementById('quiz-list');

            quizList.innerHTML = `
                <div class="text-center py-8 text-slate-500">
                    <span class="animate-spin inline-block">⟳</span> Loading quizzes...
                </div>
            `;
            menuSection.classList.remove('hidden');

            try {
                const response = await fetch(`${GAS_LOADER_URL}?action=getMenu&token=${encodeURIComponent(token)}`);
                const data = await response.json();

                if (data.result === 'success') {
                    renderQuizMenu(data.menu);
                } else if (data.requireLogin) {
                    handleLogout();
                } else {
                    quizList.innerHTML = `<div class="text-center py-8 text-rose-700">${data.msg || 'Failed to load quizzes'}</div>`;
                }
            } catch (err) {
                quizList.innerHTML = `<div class="text-center py-8 text-rose-700">Connection error</div>`;
            }
        }

        function renderQuizMenu(menuData) {
            const quizList = document.getElementById('quiz-list');
            quizList.innerHTML = '';

            if (!menuData || menuData.length <= 1) {
                quizList.innerHTML = '<div class="text-center py-8 text-slate-500">No quizzes available</div>';
                return;
            }

            // Skip header row (index 0)
            for (let i = 1; i < menuData.length; i++) {
                const row = menuData[i];
                const quizId = String(row[0] || '').trim();
                const year = String(row[1] || '').trim();

                if (!quizId) continue;

                const card = document.createElement('div');
                card.className = 'quiz-card rounded-2xl p-6 cursor-pointer';
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div class="w-14 h-14 bg-emerald-500/10 border border-emerald-400/20 flex items-center justify-center">
                                <i data-lucide="file-question" class="w-7 h-7 text-emerald-700"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-slate-900">${quizId}</h3>
                                <p class="text-sm text-slate-500">${year ? 'Year: ' + year : 'Reading Quiz'}</p>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                    </div>
                `;

                card.addEventListener('click', () => startQuiz(quizId));
                quizList.appendChild(card);
            }

            lucide.createIcons();
        }

        // ============ QUIZ LOADING (FIXED) ============
        async function startQuiz(quizId) {
            const token = localStorage.getItem('jwt_token');

            menuSection.classList.add('hidden');
            quizSection.classList.remove('hidden');

            // Force DOM update
            await new Promise(r => setTimeout(r, 50));

            document.getElementById('quiz-title').textContent = quizId;

            // ✅ FIX: Set loading state without destroying the structure
            document.getElementById('question-text').textContent = 'Loading questions...';
            document.getElementById('options-container').innerHTML =
                '<div class="text-center py-8 text-slate-500"><span class="animate-spin inline-block">⟳</span> Loading...</div>';

            try {
                const response = await fetch(
                    `${GAS_LOADER_URL}?action=getQuiz&token=${encodeURIComponent(token)}&quizId=${encodeURIComponent(quizId)}`
                );
                const data = await response.json();

                if (data.result === 'success') {
                    quizData = data;
                    currentQuiz = quizId;
                    currentQuestionIndex = 0;
                    userAnswers = {};
                    correctAnswers = {};

                    // Store correct answers
                    data.questions.forEach(q => {
                        correctAnswers[q.no] = q.answer;
                    });

                    // Show paragraph
                    const paraEl = document.getElementById('paragraph-text');
                    if (paraEl) {
                        paraEl.innerHTML = (data.paragraph || 'No reading passage provided.').replace(/\n/g, '<br>');
                    }

                    // Check if questions exist
                    if (!data.questions || data.questions.length === 0) {
                        alert('No questions found for this quiz.');
                        showMenuSection();
                        return;
                    }

                    renderQuestion();
                } else {
                    alert('Failed to load quiz: ' + (data.msg || data.message || 'Unknown error'));
                    showMenuSection();
                }
            } catch (err) {
                console.error('Quiz load error:', err);
                alert('Error loading quiz: ' + err.message);
                showMenuSection();
            }
        }

        // ============ QUESTION RENDERING ============
        function renderQuestion() {
            const questions = quizData.questions;
            const total = questions.length;

            if (currentQuestionIndex >= total) {
                showSubmitButton();
                return;
            }

            const q = questions[currentQuestionIndex];
            const questionNum = q.no;

            // Update progress
            document.getElementById('quiz-progress').textContent = `Question ${currentQuestionIndex + 1} of ${total}`;
            document.getElementById('progress-fill').style.width = `${((currentQuestionIndex) / total) * 100}%`;

            // Update question
            document.getElementById('question-text').textContent = `${questionNum}. ${q.question}`;

            // Render options
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            const options = [
                { key: 'A', text: q.optionA },
                { key: 'B', text: q.optionB },
                { key: 'C', text: q.optionC },
                { key: 'D', text: q.optionD }
            ];

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className =
                    `option-btn w-full text-left px-5 py-4 rounded-xl flex items-center space-x-4 ${userAnswers[questionNum] === opt.key ? 'selected' : ''}`;
                btn.innerHTML = `
                    <span class="w-10 h-10 rounded-full bg-white/70 border border-slate-900/[0.08] flex items-center justify-center font-bold text-sm text-slate-800">${opt.key}</span>
                    <span class="flex-1 text-slate-800">${opt.text}</span>
                `;
                btn.addEventListener('click', () => selectOption(questionNum, opt.key));
                optionsContainer.appendChild(btn);
            });

            // Update nav buttons
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            document.getElementById('submit-quiz-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function selectOption(questionNo, answer) {
            userAnswers[questionNo] = answer;

            // Update UI
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.querySelector('span:first-child').textContent === answer) {
                    btn.classList.add('selected');
                }
            });
        }

        function showPreviousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function showNextQuestion() {
            const questions = quizData.questions;
            const q = questions[currentQuestionIndex];

            if (!userAnswers[q.no]) {
                alert('Please select an answer before proceeding.');
                return;
            }

            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showSubmitButton();
            }
        }

        function showSubmitButton() {
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('quiz-progress').textContent = `Question ${quizData.questions.length} of ${quizData.questions.length}`;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('submit-quiz-btn').classList.remove('hidden');
        }

        // ============ SUBMIT QUIZ ============
        async function submitQuiz() {
            const token = localStorage.getItem('jwt_token');
            const btn = document.getElementById('submit-quiz-btn');

            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin inline-block">⟳</span> Submitting...';

            try {
                // Calculate score
                let score = 0;
                const total = quizData.questions.length;

                quizData.questions.forEach(q => {
                    if (userAnswers[q.no] === q.answer) {
                        score++;
                    }
                });

                const percentage = Math.round((score / total) * 100);

                // Submit to server
                const response = await fetch(GAS_LOADER_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        action: "submitQuiz",
                        token: token,
                        quizId: currentQuiz,
                        answers: userAnswers,
                        score: score,
                        total: total
                    })
                });

                const data = await response.json();

                // Show results
                quizSection.classList.add('hidden');
                resultsSection.classList.remove('hidden');

                document.getElementById('result-score').textContent = `${score}/${total}`;
                document.getElementById('result-percentage').textContent = `${percentage}%`;

                // Update icon based on score
                const resultIcon = document.getElementById('result-icon');
                if (percentage >= 80) {
                    resultIcon.className =
                        'w-24 h-24 mx-auto rounded-full bg-emerald-500/10 border border-emerald-400/20 flex items-center justify-center mb-6';
                    resultIcon.innerHTML = '<i data-lucide="trophy" class="w-12 h-12 text-emerald-600"></i>';
                } else if (percentage >= 60) {
                    resultIcon.className =
                        'w-24 h-24 mx-auto rounded-full bg-amber-500/10 border border-amber-400/20 flex items-center justify-center mb-6';
                    resultIcon.innerHTML = '<i data-lucide="thumbs-up" class="w-12 h-12 text-amber-600"></i>';
                } else {
                    resultIcon.className =
                        'w-24 h-24 mx-auto rounded-full bg-rose-500/10 border border-rose-400/20 flex items-center justify-center mb-6';
                    resultIcon.innerHTML = '<i data-lucide="refresh-cw" class="w-12 h-12 text-rose-600"></i>';
                }

                lucide.createIcons();
                renderReview();

            } catch (err) {
                alert('Submission error. Your answers have been saved locally.');
                quizSection.classList.add('hidden');
                resultsSection.classList.remove('hidden');
            }
        }

        // ============ REVIEW ============
        function toggleReview() {
            const reviewSection = document.getElementById('review-section');
            reviewSection.classList.toggle('hidden');
        }

        function renderReview() {
            const reviewSection = document.getElementById('review-section');
            reviewSection.innerHTML = '<h3 class="text-lg font-bold mb-4 text-slate-900">Answer Review</h3>';

            quizData.questions.forEach(q => {
                const userAnswer = userAnswers[q.no] || '-';
                const isCorrect = userAnswer === q.answer;

                const card = document.createElement('div');
                card.className =
                    `glass-panel rounded-xl p-5 mb-3 ${isCorrect ? 'border-emerald-500/30' : 'border-rose-500/30'}`;
                card.innerHTML = `
                    <div class="flex items-start space-x-4">
                        <div class="w-8 h-8 rounded-full ${isCorrect ? 'bg-emerald-500/20' : 'bg-rose-500/20'} flex items-center justify-center shrink-0">
                            <i data-lucide="${isCorrect ? 'check' : 'x'}" class="w-4 h-4 ${isCorrect ? 'text-emerald-600' : 'text-rose-600'}"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-medium mb-2 text-slate-900">${q.no}. ${q.question}</p>
                            <p class="text-sm text-slate-700">
                                <span class="text-slate-500">Your answer: </span>
                                <span class="${isCorrect ? 'text-emerald-700' : 'text-rose-700'}">${userAnswer}</span>
                                ${!isCorrect ? `<span class="text-slate-500"> (Correct: <span class="text-emerald-700">${q.answer}</span>)</span>` : ''}
                            </p>
                        </div>
                    </div>
                `;
                reviewSection.appendChild(card);
            });

            lucide.createIcons();
        }

        // ============ NAVIGATION ============
        function showMenuSection() {
            quizSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            document.getElementById('review-section').classList.add('hidden');
            menuSection.classList.remove('hidden');
            loadQuizMenu();
        }
    </script>
</body>
</html>
